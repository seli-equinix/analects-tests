# CCA Test Pipeline — one test per pipeline, dispatched dynamically.
#
# Adding a new test file requires ZERO changes here. Drop a file at
# tests/<category>/test_<name>.py — the dashboard auto-discovers it,
# clicking Run triggers a pipeline with RUN_TEST=<name>, the dispatcher
# below finds the file from $RUN_TEST and runs it. The canonical name
# `<name>` is derived once by tests/_naming.py:canonical_name (the doc
# standard, see docs/testing/writing-tests.md).
#
# Trigger via Makefile:  make test NAME=eva-code-trace
# Or via dashboard:      Run / Run All buttons (each test = separate pipeline)
# Or via API:            POST /pipeline  variables[RUN_TEST]=eva-code-trace
#
# Special RUN_TEST values:
#   build  — rebuild test Docker image (no pytest)

stages:
  - build
  - contract
  - preflight
  - test
  - deploy

# Only trigger from web UI, API, or scheduled — NOT on push.
# This prevents 25 "manual" jobs cluttering every commit.
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "api"
    - if: $CI_PIPELINE_SOURCE == "trigger"
    - if: $CI_PIPELINE_SOURCE == "schedule"

variables:
  RUN_TEST: ""
  # RUN_TEST_CATEGORY lets the two dispatcher jobs (test-agent / test-unit)
  # decide which template to extend. The dashboard's _trigger_pipeline
  # reads TestDefinition.category and sets this automatically; local
  # `make test NAME=...` callers can omit it (default = empty = agent path).
  RUN_TEST_CATEGORY: ""
  CCA_RUN_JUDGE: "1"
  CCA_TEST_API_KEY: "cca_k_58591dcb6e1ab9e4dee1fcc30d47f0c6552599741e0f3d55"
  # GIT_STRATEGY: clone (fresh clone per job, not shared cache) — avoids
  # "fatal: shallow file has changed since we read it" race when the dashboard
  # fires 30+ pipelines at once and multiple runners fetch the same shallow
  # repo concurrently.
  GIT_STRATEGY: clone
  GIT_DEPTH: "1"

# ── Reusable template for AGENT test jobs (drive the CCA HTTP server) ──
.test-base:
  stage: test
  image: 192.168.4.204:5000/cca-tests/test-runner:latest
  needs: [health-check]
  resource_group: cca-llm
  # No hard timeout — SSE idle timeout (120s) + circuit breaker are the real watchdogs
  variables:
    # Alias for legacy test code that reads CCA_URL rather than CCA_BASE_URL.
    CCA_URL: "$CCA_BASE_URL"
  artifacts:
    when: always
    paths:
      - "report-*.xml"
      - "reports/"
    reports:
      junit: "report-*.xml"
    expire_in: 90 days
  after_script:
    # Upload reports to CCA server for local storage on Spark1
    # Uses CCA_TEST_API_KEY for auth (CCA_API_AUTH=1 requires Bearer token)
    - |
      CCA_URL="${CCA_BASE_URL:-https://192.168.4.205:8500}"
      AUTH=""
      [ -n "$CCA_TEST_API_KEY" ] && AUTH="-H \"Authorization: Bearer $CCA_TEST_API_KEY\""
      # Upload individual report folders with unique names (no overwrite)
      for dir in reports/*/; do
        if [ -d "$dir" ]; then
          FOLDER_NAME=$(basename "$dir")
          # Strip P{pipeline_id}_ prefix if already present (report_generator adds it)
          UPLOAD_NAME="${FOLDER_NAME#P${CI_PIPELINE_ID}_}"
          ARGS="-F pipeline_id=$CI_PIPELINE_ID -F test_name=$UPLOAD_NAME"
          [ -f "${dir}report.md" ] && ARGS="$ARGS -F report=@${dir}report.md"
          [ -f "${dir}metadata.json" ] && ARGS="$ARGS -F metadata=@${dir}metadata.json"
          [ -f "${dir}tool_calls.json" ] && ARGS="$ARGS -F tool_calls=@${dir}tool_calls.json"
          [ -f "${dir}cca_debug.log" ] && ARGS="$ARGS -F debug_log=@${dir}cca_debug.log"
          [ -f "${dir}manifest.json" ] && ARGS="$ARGS -F manifest=@${dir}manifest.json"
          eval curl -4sf -X POST "$CCA_URL/admin/upload-report" $AUTH $ARGS || echo "WARN: upload failed for $dir"
        fi
      done
      # Upload JUnit XML aggregate (pytest summary with pass/fail counts)
      JUNIT_FILE="report-${RUN_TEST}.xml"
      if [ -f "$JUNIT_FILE" ]; then
        eval curl -4sf -X POST "$CCA_URL/admin/upload-report" $AUTH \
          -F pipeline_id=$CI_PIPELINE_ID -F test_name=$RUN_TEST \
          -F junit=@${JUNIT_FILE} || echo "WARN: JUnit upload failed"
      fi
  allow_failure: true

# ════════════════════════════════════════════
#  BUILD — rebuild test image when deps change
# ════════════════════════════════════════════

build-test-image:
  stage: build
  image: docker:latest
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
  # Auth comes from the project's DOCKER_AUTH_CONFIG CI/CD variable.
  script:
    - docker build -t 192.168.4.204:5000/cca-tests/test-runner:latest -f Dockerfile.test .
    - docker push 192.168.4.204:5000/cca-tests/test-runner:latest
  rules:
    - if: '$RUN_TEST == "build"'

# ════════════════════════════════════════════
#  CONTRACT — schema-drift gate (Phase 2)
# ════════════════════════════════════════════
#
# Runs on every push (no RUN_TEST gate). Fails the pipeline if any
# Pydantic / tool / OpenAPI schema in the codebase changed shape
# without a corresponding `version` bump on the affected model
# (see tests/contract/test_schema_drift.py for the matrix).
#
# Bypass for an emergency: include the literal token `[skip-contract]`
# in the commit message — but the merge still requires the schema to be
# refreshed before deploy.
contract-schema-drift:
  stage: contract
  image: 192.168.4.204:5000/cca-tests/test-runner:latest
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[skip-contract\]/'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
  allow_failure: false
  script:
    - python3 -m pytest tests/contract/ -v --tb=short --junitxml=report-contract-tests.xml
  artifacts:
    when: always
    paths: ["report-*.xml"]
    reports:
      junit: "report-*.xml"
    expire_in: 30 days
  timeout: 15m

# Phase 3.3.5 — unit-test bucket gate. Mirrors contract-schema-drift:
# runs on every push (no RUN_TEST gate), `allow_failure: false`. Catches
# regressions in tests/unit/ before they reach the integration suite.
unit-tests:
  stage: contract
  image: 192.168.4.204:5000/cca-tests/test-runner:latest
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[skip-contract\]/'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
  allow_failure: false
  script:
    - python3 -m pytest tests/unit/ -v --tb=short --junitxml=report-unit-tests.xml
  artifacts:
    when: always
    paths: ["report-*.xml"]
    reports:
      junit: "report-*.xml"
    expire_in: 30 days
  timeout: 20m

# ── Reusable template for unit + contract test jobs (no CCA dependency) ──
.unit-test-base:
  stage: contract
  image: 192.168.4.204:5000/cca-tests/test-runner:latest
  artifacts:
    when: always
    paths: ["report-*.xml"]
    reports:
      junit: "report-*.xml"
    expire_in: 30 days
  timeout: 5m
  # Mirror `.test-base`'s JUnit upload so the dashboard sees per-run
  # results for unit tests too.
  after_script:
    - |
      CCA_URL="${CCA_BASE_URL:-https://192.168.4.205:8500}"
      AUTH=""
      [ -n "$CCA_TEST_API_KEY" ] && AUTH="-H \"Authorization: Bearer $CCA_TEST_API_KEY\""
      JUNIT_FILE="report-${RUN_TEST}.xml"
      if [ -f "$JUNIT_FILE" ]; then
        eval curl -4sf -X POST "$CCA_URL/admin/upload-report" $AUTH \
          -F pipeline_id=$CI_PIPELINE_ID -F test_name=$RUN_TEST \
          -F junit=@${JUNIT_FILE} || echo "WARN: JUnit upload failed"
      fi

# ════════════════════════════════════════════
#  PREFLIGHT — auto-runs before every test
# ════════════════════════════════════════════

health-check:
  stage: preflight
  image: 192.168.4.204:5000/cca-tests/test-runner:latest
  script:
    - echo "=== Analects Server ==="
    - curl -4sf --max-time 10 $CCA_BASE_URL/health | python3 -m json.tool
    - echo "=== vLLM Server ==="
    - curl -4sf --max-time 10 ${VLLM_BASE_URL%/v1}/health && echo "OK"
    - echo "=== Phoenix ==="
    - curl -4sf --max-time 5 $PHOENIX_URL/ > /dev/null && echo "OK" || echo "WARNING - unreachable (non-fatal)"
  rules:
    # Only run preflight for AGENT tests — unit/contract dispatch doesn't
    # need CCA up. Otherwise unit-only triggers would fail at preflight.
    - if: '$RUN_TEST != "" && $RUN_TEST != "build" && $RUN_TEST_CATEGORY != "unit" && $RUN_TEST_CATEGORY != "contract"'
  timeout: 2m

# ════════════════════════════════════════════
#  PER-TEST DISPATCHERS — one job replaces 57 hand-written ones
# ════════════════════════════════════════════
#
# The dashboard (or `make test NAME=...`) sets RUN_TEST to the canonical
# test name (file stem, kebab-case). RUN_TEST_CATEGORY tells the
# dispatcher which template to use:
#   - "unit" / "contract"  -> test-unit (no CCA dependency)
#   - anything else        -> test-agent (full agent stack)
#
# The dispatcher finds the file by translating `<name>` back to
# `test_<name with _ instead of ->.py` and globbing the right subtree.
# Adding a new test file requires no YAML change.

test-agent:
  extends: .test-base
  script:
    - |
      TEST_FILE=$(find tests/user tests/websearch tests/coder tests/integration tests/knowledge \
        -name "test_${RUN_TEST//-/_}.py" -print -quit 2>/dev/null)
      if [ -z "$TEST_FILE" ]; then
        echo "No agent test file matches RUN_TEST=$RUN_TEST"; exit 1
      fi
      # Knowledge tests are factual lookup; the LLM judge adds no signal
      # and doubles vLLM load. Skip --with-judge for that category only.
      JUDGE_FLAG="--with-judge"
      case "$TEST_FILE" in
        tests/knowledge/*) JUDGE_FLAG="" ;;
      esac
      echo "Running $TEST_FILE  judge=${JUDGE_FLAG:-off}"
      python -m pytest "$TEST_FILE" -v --tb=short $JUDGE_FLAG \
        --junitxml="report-${RUN_TEST}.xml"
  environment:
    name: "test/${RUN_TEST}"
    deployment_tier: testing
  rules:
    - if: '$RUN_TEST != "" && $RUN_TEST != "build" && $RUN_TEST_CATEGORY != "unit" && $RUN_TEST_CATEGORY != "contract"'

test-unit:
  extends: .unit-test-base
  script:
    - |
      TEST_FILE=$(find tests/unit tests/contract -name "test_${RUN_TEST//-/_}.py" -print -quit)
      if [ -z "$TEST_FILE" ]; then
        echo "No unit/contract test file matches RUN_TEST=$RUN_TEST"; exit 1
      fi
      echo "Running $TEST_FILE"
      python3 -m pytest "$TEST_FILE" -v --tb=short \
        --junitxml="report-${RUN_TEST}.xml"
  rules:
    - if: '$RUN_TEST != "" && ($RUN_TEST_CATEGORY == "unit" || $RUN_TEST_CATEGORY == "contract")'

# ════════════════════════════════════════════
#  PAGES — deploy CCA test dashboard
# ════════════════════════════════════════════

pages:
  stage: deploy
  image: alpine:latest
  script:
    - echo "Deploying CCA test dashboard to GitLab Pages"
    - ls -la public/
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: '$RUN_TEST == "pages"'
