# CCA Test Pipeline — One test per pipeline, always isolated.
#
# Each test runs in its own pipeline with:
#   - GitLab environment (deployment history per test)
#   - Phoenix project (isolated trace history per test)
#
# Trigger via Makefile:  make test NAME=eva-code-trace
# Or via dashboard:      Run / Run All buttons (each test = separate pipeline)
# Or via API:            POST /pipeline  variables[RUN_TEST]=eva-code-trace
#
# RUN_TEST values:
#   Individual:  eva-code-trace, code-trace, bash-execution, etc.
#   Build only:  build
#
# Group runs (all, all-user, etc.) are handled by the dashboard — it fires
# one pipeline per test, never groups multiple tests into one pipeline.

stages:
  - build
  - preflight
  - test
  - deploy

# Only trigger from web UI, API, or scheduled — NOT on push.
# This prevents 25 "manual" jobs cluttering every commit.
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "api"
    - if: $CI_PIPELINE_SOURCE == "trigger"
    - if: $CI_PIPELINE_SOURCE == "schedule"

variables:
  RUN_TEST: ""
  PHOENIX_PROJECT_NAME: "cca-tests"
  CCA_RUN_JUDGE: "1"
  CCA_TEST_API_KEY: "cca_k_58591dcb6e1ab9e4dee1fcc30d47f0c6552599741e0f3d55"
  GIT_STRATEGY: fetch

# ── Reusable template for all test jobs ──
.test-base:
  stage: test
  image: 192.168.4.204:5000/cca-tests/test-runner:latest
  needs: [health-check]
  resource_group: cca-llm
  timeout: 45m                    # Safety net only — the test client's SSE idle timeout (120s) is the real watchdog
  artifacts:
    when: always
    paths:
      - "report-*.xml"
      - "reports/"
    reports:
      junit: "report-*.xml"
    expire_in: 90 days
  after_script:
    # Upload reports to CCA server for local storage on Spark1
    - |
      CCA_URL="${CCA_BASE_URL:-http://192.168.4.205:8500}"
      for dir in reports/*/; do
        if [ -d "$dir" ]; then
          ARGS="-F pipeline_id=$CI_PIPELINE_ID -F test_name=$RUN_TEST"
          [ -f "${dir}report.md" ] && ARGS="$ARGS -F report=@${dir}report.md"
          [ -f "${dir}metadata.json" ] && ARGS="$ARGS -F metadata=@${dir}metadata.json"
          [ -f "${dir}tool_calls.json" ] && ARGS="$ARGS -F tool_calls=@${dir}tool_calls.json"
          [ -f "${dir}cca_debug.log" ] && ARGS="$ARGS -F debug_log=@${dir}cca_debug.log"
          curl -sf -X POST "$CCA_URL/admin/upload-report" $ARGS || true
        fi
      done
  allow_failure: true

# ════════════════════════════════════════════
#  BUILD — rebuild test image when deps change
# ════════════════════════════════════════════

build-test-image:
  stage: build
  image: docker:latest
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
  script:
    - docker login -u ${REGISTRY_USER:-admin} -p ${REGISTRY_PASS} 192.168.4.204:5000
    - docker build -t 192.168.4.204:5000/cca-tests/test-runner:latest -f Dockerfile.test .
    - docker push 192.168.4.204:5000/cca-tests/test-runner:latest
  rules:
    - if: '$RUN_TEST == "build"'

# ════════════════════════════════════════════
#  PREFLIGHT — auto-runs before every test
# ════════════════════════════════════════════

health-check:
  stage: preflight
  image: 192.168.4.204:5000/cca-tests/test-runner:latest
  script:
    - echo "=== Analects Server ==="
    - curl -sf --max-time 10 $CCA_BASE_URL/health | python3 -m json.tool
    - echo "=== vLLM Server ==="
    - curl -sf --max-time 10 ${VLLM_BASE_URL%/v1}/health && echo "OK"
    - echo "=== Phoenix ==="
    - curl -sf --max-time 5 $PHOENIX_URL/ > /dev/null && echo "OK" || echo "WARNING - unreachable (non-fatal)"
  rules:
    - if: $RUN_TEST    # Runs whenever RUN_TEST is set (any test trigger)
  timeout: 2m

# ════════════════════════════════════════════
#  USER TESTS
# ════════════════════════════════════════════

test-new-user-onboarding:
  extends: .test-base
  variables:
    PHOENIX_PROJECT_NAME: "new-user-onboarding"
  script:
    - python -m pytest tests/user/test_new_user_onboarding.py -v --tb=short --with-judge --junitxml=report-new-user-onboarding.xml
  environment:
    name: test/user/new-user-onboarding
    deployment_tier: testing
  rules:
    - if: '$RUN_TEST == "new-user-onboarding"'

